<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shawn Si GitHub profile banner</title>
  <desc id="desc">Editorial banner with a geometric orbit mark, quiet typography, and layered frame motifs inspired by a photography portfolio.</desc>
