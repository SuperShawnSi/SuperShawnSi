  <text x="252" y="104" fill="#6E6A63" font-family="Helvetica, Arial, sans-serif" font-size="16" letter-spacing="4">GITHUB PROFILE</text>
  <text x="252" y="180" fill="#161B20" font-family="Georgia, 'Times New Roman', serif" font-size="62">Shaowen Si</text>
  <text x="252" y="226" fill="#161B20" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic">Engineer by training. Photographer by instinct.</text>
  <text x="252" y="274" fill="#5B6168" font-family="Helvetica, Arial, sans-serif" font-size="19">CS student building full-stack systems around images, interfaces,</text>
  <text x="252" y="302" fill="#5B6168" font-family="Helvetica, Arial, sans-serif" font-size="19">and the quiet details that make digital work feel intentional.</text>
  <text x="252" y="352" fill="#1466B8" font-family="Helvetica, Arial, sans-serif" font-size="15" letter-spacing="3">NEXT.JS / TYPESCRIPT / SUPABASE / R2 / IMAGE PIPELINES</text>

